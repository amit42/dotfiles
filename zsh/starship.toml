# ╔═══════════════════════════════════════════════════════╗
# ║  starship.toml — managed via dotfiles                ║
# ╚═══════════════════════════════════════════════════════╝

# Two-line prompt:
# Line 1 left:  dir  git  language
# Line 1 right: duration  time
# Line 2:       ❯
format = """
$directory$git_branch$git_status$python$golang$rust$nodejs$c$kubernetes$aws
$character"""

right_format = """$cmd_duration$time"""

add_newline = true
palette = "catppuccin"

[palettes.catppuccin]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext   = "#a6adc8"
overlay   = "#6c7086"
surface   = "#313244"
base      = "#1e1e2e"

# ── Directory ────────────────────────────────────────────
[directory]
style = "bold blue"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

# ── Git ──────────────────────────────────────────────────
[git_branch]
symbol = ""
style = "mauve"
format = "[$symbol $branch]($style) "

[git_status]
style = "red"
format = '([$all_status$ahead_behind]($style) )'
ahead    = "⇡$count"
behind   = "⇣$count"
diverged = "⇡$ahead_count⇣$behind_count"
modified = "!"
staged   = "+"
untracked = "?"
deleted  = "✘"
stashed  = "~"

# ── Languages — only when files present ──────────────────
[python]
symbol = "py"
format = "[$symbol $version]($style) "
style = "yellow"
detect_files = ["*.py", "requirements.txt", "pyproject.toml", "setup.py", ".python-version"]
version_format = "$major.$minor"

[golang]
symbol = "go"
format = "[$symbol $version]($style) "
style = "sky"
detect_files = ["go.mod"]
version_format = "$major.$minor"

[rust]
symbol = "rs"
format = "[$symbol $version]($style) "
style = "peach"
detect_files = ["Cargo.toml"]
version_format = "$major.$minor"

[nodejs]
symbol = "node"
format = "[$symbol $version]($style) "
style = "green"
detect_files = ["package.json"]
version_format = "$major.$minor"

[c]
symbol = "c"
format = "[$symbol]($style) "
style = "sapphire"
detect_files = ["*.c", "*.h", "Makefile", "CMakeLists.txt"]

# ── DevOps — only in relevant dirs ───────────────────────
[aws]
symbol = "aws"
format = "[$symbol $profile]($style) "
style = "peach"

[kubernetes]
symbol = "k8s"
format = "[$symbol $context]($style) "
style = "teal"
disabled = false
detect_files   = ["*.yaml", "*.yml", "Chart.yaml", "kustomization.yaml", "helmfile.yaml"]
detect_folders = [".kube", "k8s", "kubernetes", "helm"]

# ── Right side ───────────────────────────────────────────
[cmd_duration]
min_time = 1_000
format = "[$duration]($style) "
style = "overlay"

[time]
disabled = false
format = "[$time]($style)"
style = "overlay"
time_format = "%H:%M"

# ── Prompt character ─────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold mauve)"

# ── Disable noisy modules ────────────────────────────────
[package]
disabled = true

[docker_context]
disabled = true
