# ╔═══════════════════════════════════════════════════════╗
# ║  tmux.conf — managed via dotfiles                    ║
# ║  Edit: dotfiles/tmux/tmux.conf                       ║
# ║  Install: bash install.sh                            ║
# ╚═══════════════════════════════════════════════════════╝
#
# PLUGIN MAP (installed via TPM — Prefix+I on first run):
#   tpm               — plugin manager itself
#   tmux-sensible     — sane defaults (larger scrollback, faster repeat, etc.)
#   tmux-resurrect    — save/restore sessions across reboots (Prefix+Ctrl+s/r)
#   tmux-continuum    — auto-save every 15min + auto-restore on tmux start
#
# QUICK REFERENCE:
#   Prefix = Ctrl+Space
#   |  split vertical      -  split horizontal
#   hjkl  navigate panes   HJKL  resize panes
#   c  new window          ,  rename window
#   Ctrl+h/l  prev/next window
#   Enter  copy mode       v  select   y  copy
#   r  reload config       Prefix+I  install plugins

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PREFIX
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Ctrl+Space chosen to avoid conflicts with:
#   Ctrl+A — WezTerm select all / zsh start-of-line
#   Ctrl+B — neovim uses internally
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ENVIRONMENT PASSTHROUGH
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Forward WezTerm's pane-identifying env vars into tmux panes so the
# `wtn` shell function (and any `wezterm cli ...` invocation) can find
# the right pane to act on.
set -ga update-environment WEZTERM_PANE
set -ga update-environment WEZTERM_UNIX_SOCKET

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GRAPHICS PASSTHROUGH
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Lets Kitty / iTerm / Sixel graphics escapes flow through tmux to the
# outer terminal (WezTerm). Required for: image.nvim, tdf, any TUI that
# renders pictures or uses the terminal graphics protocol.
set -g allow-passthrough on

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GENERAL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
set -g mouse on                  # mouse scrolling, click to focus pane
set -g history-limit 50000       # lines of scrollback per pane
set -g base-index 1              # windows start at 1, not 0 (easier to reach)
setw -g pane-base-index 1        # panes start at 1 too
set -g renumber-windows on       # close window 2 of 1,2,3 → windows become 1,2

# Critical for neovim:
#   escape-time 0  — without this, Escape in nvim lags ~500ms
#   focus-events   — tells nvim when tmux pane gains/loses focus
#                    enables autoread (file change detection) in nvim
set -sg escape-time 0
set -g focus-events on

set -g display-time 2000         # status messages visible for 2 seconds

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# COLORS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# tmux-256color enables 256 colors + italics support
# terminal-overrides passes RGB (true color) through to the terminal
# Without this: colors in neovim look wrong (washed out / different from terminal)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",*256col*:Tc"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WINDOWS & PANES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Splits — open in current directory
bind | split-window -h -c "#{pane_current_path}"   # vertical split (side by side)
bind - split-window -v -c "#{pane_current_path}"   # horizontal split (top/bottom)
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim hjkl (no prefix needed after binding)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift+hjkl (repeatable — hold prefix, tap HJKL)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation without number jumping
bind -r C-h previous-window
bind -r C-l next-window

# Prefix-free window switching — no prefix needed, just tap
bind -n M-h previous-window
bind -n M-l next-window

# Kill without confirmation prompt
bind x kill-pane
bind X kill-window

# Reload config in place — no need to restart tmux
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# COPY MODE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# vi-style copy mode — feels like visual mode in neovim
setw -g mode-keys vi

bind Enter copy-mode                              # enter copy mode
bind -T copy-mode-vi v   send -X begin-selection # v to start selection
bind -T copy-mode-vi C-v send -X rectangle-toggle # Ctrl+v for block select
bind -T copy-mode-vi y   send -X copy-selection-and-cancel # y to yank

# Paste with Prefix+p
bind p paste-buffer

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# STATUS BAR — Catppuccin Mocha
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Colors:
#   base    = #1e1e2e  (background)
#   surface = #313244  (inactive elements)
#   blue    = #89b4fa  (session name accent)
#   mauve   = #cba6f7  (active window)
#   text    = #cdd6f4  (foreground)
#   overlay = #6c7086  (subtle text)

set -g status on
set -g status-position bottom
set -g status-interval 1          # refresh every second (for clock)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name as a colored pill
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa] "

# Right: date and time
set -g status-right-length 60
set -g status-right "#[fg=#6c7086] %a %d %b  #[fg=#cdd6f4,bold]%H:%M "

# Per-window colors so tabs are visually distinct.
#   Inactive  →  surface-gray block, per-window color as text
#   Active    →  full per-window color block, dark bold text
# Same "block" shape for both; the difference (gray vs colored bg) makes
# the active tab unmistakable at a glance.
setw -g window-status-format         "#[bg=#313244,fg=#{?#{==:#I,1},#f38ba8,#{?#{==:#I,2},#fab387,#{?#{==:#I,3},#f9e2af,#{?#{==:#I,4},#a6e3a1,#{?#{==:#I,5},#89dceb,#{?#{==:#I,6},#cba6f7,#{?#{==:#I,7},#f5c2e7,#94e2d5}}}}}}}] #W "
setw -g window-status-current-format "#[bg=#{?#{==:#I,1},#f38ba8,#{?#{==:#I,2},#fab387,#{?#{==:#I,3},#f9e2af,#{?#{==:#I,4},#a6e3a1,#{?#{==:#I,5},#89dceb,#{?#{==:#I,6},#cba6f7,#{?#{==:#I,7},#f5c2e7,#94e2d5}}}}}}},fg=#1e1e2e,bold] #W "

# Small gap between tabs so adjacent solid colors don't visually merge
setw -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Show pane numbers (Prefix+q) for 3s instead of the 1s default
set -g display-panes-time 3000

# Resize aggressively only when a window is actively viewed in a smaller
# client — prevents content shrinking when an unused client is connected.
setw -g aggressive-resize on

# Don't auto-rename windows from command names — keep manual names sticky.
setw -g automatic-rename off

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TPM PLUGINS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TPM is bootstrapped by install.sh — cloned to ~/.tmux/plugins/tpm
# After first tmux open: press Prefix+I to install all plugins below.
# Prefix+U to update, Prefix+Alt+u to remove unused.

set -g @plugin 'tmux-plugins/tpm'

# tmux-sensible — sane defaults everyone agrees on
# (larger scrollback, faster key repeat, UTF-8, etc.)
set -g @plugin 'tmux-plugins/tmux-sensible'

# tmux-resurrect — save and restore sessions across system reboots
#   Prefix+Ctrl+s  →  save session
#   Prefix+Ctrl+r  →  restore session
#   Saves: windows, panes, layout, working dirs, running programs
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'   # save pane content too
# resurrect-strategy-nvim removed — it passed nvim buffers as args on restore
# which broke the dashboard (argc became 1). Session restore is manual via <leader>S.

# tmux-continuum — automatic session saving + restore on tmux start
#   Saves every 15 minutes automatically, no manual Prefix+Ctrl+s needed
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'                  # auto-restore on tmux server start
set -g @continuum-save-interval '15'            # save every 15 minutes

# Initialize TPM — must be the last line in tmux.conf
run '~/.tmux/plugins/tpm/tpm'
